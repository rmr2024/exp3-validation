<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiment 3 - Ebook Validation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <h1>Ebook Login Validation</h1>
    <form id="ebook-form" novalidate>
      <label for="username">Username</label>
      <input id="username" name="username" required minlength="4">
      <span class="error" id="user-error"></span>

      <label for="password">Password</label>
      <input id="password" type="password" name="password" required minlength="6">
      <span class="error" id="pass-error"></span>

      <button type="submit">Login</button>
    </form>
  </main>
  <script src="validation.js"></script>
  <footer style="margin-top:2rem;padding:0.75rem 1rem;background:#f8f9fa;color:#1f2937;text-align:center;font-size:0.95rem;border-top:1px solid #e5e7eb;">Roll No: 24WH1A05T3 (h3)</footer>
</body>
</html>
